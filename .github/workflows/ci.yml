name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Bundle dist/
        run: npm run build
      - name: Fail if dist/ is out of date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "dist/ is out of date with src/. Run 'npm run build' and commit." >&2
            git diff dist/ | head -100
            exit 1
          fi
