# cicd-continuous.yml — DEMO: continuous gating with 10 stages of a SINGLE
# CrowsNest pipeline (acme-cicd-release).
#
# This shows the customer-facing pattern after the action gained `stage-name`
# support (v0.2.0): one pipeline, 10 stages, the customer's workflow calls
# the action 10 times with the same pipeline-name and a different
# stage-name each call. CrowsNest's console then shows ONE pipeline with
# 10 stages instead of 10 disconnected pipelines.
#
# Behaviour preserved from the multi-pipeline version:
#   * each action call returns its own pass/fail and halts the workflow
#     on failure
#   * the workflow stops at the EARLIEST stage that detects a problem
#   * each stage produces its own pipelinerun record (tagged with
#     pipelineMeta.stage = "<stage-name>") under the same pipeline
#
# Requires (Settings → Secrets and variables → Actions):
#   secrets.CROWSNEST_TOKEN     — admin/client JWT for the api
#   vars.CROWSNEST_API_URL      — http://crowsnest-test.gusszz.lab:18000
#   vars.CROWSNEST_CONSOLE_URL  — http://crowsnest-test.gusszz.lab:13000

name: cicd-continuous (10-stage demo)
on:
  workflow_dispatch:

env:
  CN_APP: app-CICD
  CN_PIPE: acme-cicd-release   # ← single pipeline; the stage-name input picks the stage

jobs:
  release:
    runs-on: [self-hosted, crowsnest-net]
    steps:
      - name: 'Step 1a — checkout'
        uses: actions/checkout@v4

      - name: 'Gate 1 — repo hygiene (branch protection, CODEOWNERS)'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: repo-hygiene
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 2a — lint + format'
        run: |
          echo "$ ./gradlew spotlessCheck checkstyleMain"
          sleep 1
          echo "no style violations"

      - name: 'Gate 2 — source secrets'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: source-secrets
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 3a — install dependencies'
        run: |
          echo "$ ./gradlew dependencies --refresh-dependencies"
          sleep 1
          echo "184 dependencies resolved"

      - name: 'Gate 3 — dependency vulnerabilities'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: dep-vuln
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 4a — unit tests'
        run: |
          echo "$ ./gradlew test"
          sleep 1
          echo "127 tests, 0 failures"

      - name: 'Gate 4 — tests passed'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: tests-passed
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 5a — code coverage'
        run: |
          echo "$ ./gradlew jacocoTestReport"
          sleep 1
          echo "coverage: 87.4% (>80% threshold)"

      - name: 'Gate 5 — coverage check'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: coverage
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 6a — container build'
        run: |
          echo "$ docker buildx build -t registry.internal/payments-api:${{ github.run_number }} ."
          sleep 1
          echo "image built: sha256:7d2c1f9e84a6..."

      - name: 'Gate 6 — image built (posture)'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: image-built
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 7a — container scan'
        run: |
          echo "$ trivy image --severity CRITICAL,HIGH registry.internal/payments-api:${{ github.run_number }}"
          sleep 1
          echo "0 Critical, 0 High"

      - name: 'Gate 7 — image clean (no Critical CVEs)'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: image-clean
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 8a — push image + deploy to staging'
        run: |
          echo "$ docker push registry.internal/payments-api:${{ github.run_number }}"
          echo "$ kubectl apply -n staging -f deploy.yaml"
          sleep 1
          echo "staging rollout complete"

      - name: 'Gate 8 — staging ready (TLS endpoints healthy)'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: staging-ready
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 9a — staging smoke tests'
        run: |
          echo "$ ./gradlew :smoke:test -Pstaging"
          sleep 1
          echo "all smoke tests passed"

      - name: 'Gate 9 — prod readiness (MSSQL TDE + AD identities)'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: prod-readiness
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Step 10a — production deploy'
        run: |
          echo "$ kubectl apply -n prod -f deploy.yaml"
          sleep 1
          echo "production rollout complete"

      - name: 'Gate 10 — post-deploy validation'
        uses: ./
        with:
          api-url: ${{ vars.CROWSNEST_API_URL }}
          app-id: ${{ env.CN_APP }}
          pipeline-name: ${{ env.CN_PIPE }}
          stage-name: post-deploy
          token: ${{ secrets.CROWSNEST_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_CONSOLE_URL }}

      - name: 'Done — release shipped'
        run: |
          echo "Release ${{ github.run_number }} of payments-api passed all 10 stages of acme-cicd-release."
