# release-payments-api.yml — A REAL release pipeline for the sample
# Node service at examples/payments-api/. This is what a customer's
# release.yml would look like; in their repo the service lives at the
# repo root, not under examples/.
#
# What it actually does on each run:
#   1. Install deps (npm ci against the committed lock file)
#   2. Run the test suite (real assertions against a running HTTP server)
#   3. Build a real container image with buildx (provenance + SBOM attestation)
#   4. Push the image to GHCR (private package by default)
#   5. Trivy CVE scan against the just-pushed image
#   6. Push the scan result to CrowsNest as build_cve_scan crowdata
#   7. Run the CrowsNest gate against that fresh evidence
#   8. Deploy step gated on the result
#
# Targets the PUBLIC CrowsNest install (152.228.243.192) — uses the
# CROWSNEST_PUBLIC_* vars/secrets.

name: release-payments-api

on:
  workflow_dispatch:
    inputs:
      app-id:
        description: 'CrowsNest application id'
        required: true
        default: 'app-ACME'
      pipeline-name:
        description: 'CrowsNest pipeline to gate against'
        required: true
        default: 'acme-build-evidence'
  push:
    paths:
      - 'examples/payments-api/**'
      - '.github/workflows/release-payments-api.yml'

env:
  REGISTRY:  ghcr.io
  # Image name. github.repository lower-cases to <owner>/<repo>; we append /payments-api.
  IMAGE:     ${{ github.repository }}/payments-api

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents:     read
      packages:     write       # push to GHCR
      id-token:     write       # for cosign keyless signing
      attestations: write       # for SBOM attestation
    defaults:
      run:
        working-directory: examples/payments-api

    steps:
      - uses: actions/checkout@v4

      # ── 1. BUILD STEPS (real) ──────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/payments-api/package-lock.json

      - name: 'Step 1 — install dependencies'
        run: npm ci

      - name: 'Step 2 — run tests'
        run: npm test

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Step 3 — build + push container image'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: examples/payments-api
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          # provenance + sbom are real attestations attached to the image
          provenance: mode=max
          sbom:       true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: 'Step 4 — confirm pushed image'
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          echo "image:  ${{ env.REGISTRY }}/${{ env.IMAGE }}@${DIGEST}"
          # Show first 20 lines of the manifest. With provenance: mode=max the manifest
          # is an OCI image index containing the image + provenance + SBOM attestations
          # — printing it confirms we can resolve and pull the digest end-to-end.
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE }}@${DIGEST}" | head -20

      # ── 5a. EVIDENCE COLLECTION — Trivy CVE scan ────────────────────────
      - name: 'Step 5a — Trivy CVE scan against the pushed image'
        run: |
          # Pull image creds from the host docker login (above) into Trivy by sharing the socket.
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.docker/config.json:/root/.docker/config.json:ro \
            -v /tmp:/tmp \
            aquasec/trivy:latest image \
              --quiet --format json \
              --severity CRITICAL,HIGH,MEDIUM,LOW \
              --output /tmp/trivy.json \
              ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          echo "Trivy report size: $(wc -c < /tmp/trivy.json) bytes"

      # ── 5b. EVIDENCE COLLECTION — Syft SBOM generation ──────────────────
      - name: 'Step 5b — Syft SBOM generation (CycloneDX)'
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.docker/config.json:/root/.docker/config.json:ro \
            -v /tmp:/tmp \
            anchore/syft:latest \
              ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }} \
              -o cyclonedx-json=/tmp/sbom.json
          echo "SBOM size: $(wc -c < /tmp/sbom.json) bytes"

      # ── 6a. PUSH CVE EVIDENCE TO CROWSNEST ──────────────────────────────
      - name: 'Step 6a — push CVE evidence to CrowsNest'
        id: push-cve
        uses: ./actions/push-cve-evidence
        with:
          api-url:      ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          token:        ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          app-id:       ${{ inputs.app-id || 'app-ACME' }}
          # Required because the api-server's check compares req.user.orgId (ObjectId)
          # against the body's orgId (string); omitting it triggers a type-mismatch 403.
          org-id:       '69e292d39fcbcce79bd877ad'
          image:        ${{ env.REGISTRY }}/${{ env.IMAGE }}
          image-digest: ${{ steps.build.outputs.digest }}
          trivy-file:   /tmp/trivy.json

      # ── 6b. PUSH SBOM EVIDENCE TO CROWSNEST ─────────────────────────────
      - name: 'Step 6b — push SBOM evidence to CrowsNest'
        id: push-sbom
        uses: ./actions/push-sbom-evidence
        with:
          api-url:      ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          token:        ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          app-id:       ${{ inputs.app-id || 'app-ACME' }}
          org-id:       '69e292d39fcbcce79bd877ad'
          image:        ${{ env.REGISTRY }}/${{ env.IMAGE }}
          image-digest: ${{ steps.build.outputs.digest }}
          sbom-file:    /tmp/sbom.json

      - name: Push outputs
        run: |
          echo "CVE  crowdata-id:      ${{ steps.push-cve.outputs.crowdata-id }}"
          echo "  Critical CVEs:       ${{ steps.push-cve.outputs.critical-count }}"
          echo "  High CVEs:           ${{ steps.push-cve.outputs.high-count }}"
          echo "SBOM crowdata-id:      ${{ steps.push-sbom.outputs.crowdata-id }}"
          echo "  Format:              ${{ steps.push-sbom.outputs.sbom-format }}"
          echo "  Components:          ${{ steps.push-sbom.outputs.component-count }}"

      # ── 7. THE GATE ────────────────────────────────────────────────────
      - name: 'Step 7 — CrowsNest release gate'
        id: gate
        uses: ./
        with:
          api-url:          ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          app-id:           ${{ inputs.app-id || 'app-ACME' }}
          pipeline-name:    ${{ inputs.pipeline-name || 'acme-build-evidence' }}
          token:            ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_PUBLIC_CONSOLE_URL }}
        # Important: do NOT continue-on-error here in production —
        # a no-go MUST block the deploy step below.

      # ── 8. DEPLOY (gated by step 7) ────────────────────────────────────
      - name: 'Step 8 — deploy to production'
        run: |
          echo "✓ Gate passed (${{ steps.gate.outputs.decision }})."
          echo ""
          echo "  Image:      ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
          echo "  Run record: ${{ steps.gate.outputs.run-url }}"
          echo ""
          echo "In a real workflow this step would run:"
          echo "    kubectl apply -n prod -f deployment.yaml"
          echo "    kubectl set image deployment/payments-api"
          echo "      payments-api=${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
