# release-payments-api.yml — A REAL release pipeline for the sample
# Node service at examples/payments-api/. This is what a customer's
# release.yml would look like; in their repo the service lives at the
# repo root, not under examples/.
#
# Full lifecycle:
#   0. Open a CrowsNest build record (status=started) — so even a failure
#      below is recorded, not silence.
#   1. Install deps (npm ci against the committed lock file)
#   2. Run the test suite (real assertions against a running HTTP server)
#   3. Build + push a real container image (provenance + SBOM attestation)
#   4. Confirm the pushed image
#   5. Collect evidence: Trivy CVE scan, Syft SBOM, storage state
#   6. Push CVE / SBOM / storage evidence to CrowsNest
#   7. Run the CrowsNest gate (attached to the run from step 0)
#   8. Deploy — only on go/warn
#   9. Finalize the build record — ALWAYS (maps job.status → passed/failed)
#  10. Re-assert a no-go so the GHA run reflects the block
#
# Targets the PUBLIC CrowsNest install (152.228.243.192) — uses the
# CROWSNEST_PUBLIC_* vars/secrets.

name: release-payments-api

on:
  workflow_dispatch:
    inputs:
      app-id:
        description: 'CrowsNest application id'
        required: true
        default: 'app-ACME'
      pipeline-name:
        description: 'CrowsNest pipeline to gate against'
        required: true
        default: 'acme-build-evidence'
  push:
    paths:
      - 'examples/payments-api/**'
      - '.github/workflows/release-payments-api.yml'

env:
  REGISTRY:  ghcr.io
  # github.repository lower-cases to <owner>/<repo>; we append /payments-api.
  IMAGE:     ${{ github.repository }}/payments-api

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents:     read
      packages:     write
      id-token:     write
      attestations: write
    defaults:
      run:
        working-directory: examples/payments-api

    steps:
      - uses: actions/checkout@v4

      # ── 0. OPEN the build record in CrowsNest (status=started) ──────────
      - name: 'Step 0 — report build STARTED to CrowsNest'
        id: cn-start
        uses: ./actions/report-build-status
        with:
          api-url:       ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          token:         ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          app-id:        ${{ inputs.app-id || 'app-ACME' }}
          pipeline-name: ${{ inputs.pipeline-name || 'acme-build-evidence' }}
          mode:          start
          org-id:        '69e292d39fcbcce79bd877ad'

      # ── 1. INSTALL ─────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/payments-api/package-lock.json

      - name: 'Step 1 — install dependencies'
        run: npm ci

      # ── 2. TEST ────────────────────────────────────────────────────────
      - name: 'Step 2 — run tests'
        run: npm test

      # ── 3. BUILD + PUSH IMAGE ──────────────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Step 3 — build + push container image'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: examples/payments-api
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          provenance: mode=max
          sbom:       true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── 4. CONFIRM PUSHED IMAGE ────────────────────────────────────────
      - name: 'Step 4 — confirm pushed image'
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          echo "image:  ${{ env.REGISTRY }}/${{ env.IMAGE }}@${DIGEST}"
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE }}@${DIGEST}" | head -20

      # ── 5a. EVIDENCE — Trivy CVE scan ──────────────────────────────────
      - name: 'Step 5a — Trivy CVE scan against the pushed image'
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.docker/config.json:/root/.docker/config.json:ro \
            -v /tmp:/tmp \
            aquasec/trivy:latest image \
              --quiet --format json \
              --severity CRITICAL,HIGH,MEDIUM,LOW \
              --output /tmp/trivy.json \
              ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          echo "Trivy report size: $(wc -c < /tmp/trivy.json) bytes"

      # ── 5b. EVIDENCE — Syft SBOM ───────────────────────────────────────
      - name: 'Step 5b — Syft SBOM generation (CycloneDX)'
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.docker/config.json:/root/.docker/config.json:ro \
            -v /tmp:/tmp \
            anchore/syft:latest \
              ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }} \
              -o cyclonedx-json=/tmp/sbom.json
          echo "SBOM size: $(wc -c < /tmp/sbom.json) bytes"

      # ── 5c. EVIDENCE — artifact storage state ──────────────────────────
      - name: 'Step 5c — fetch storage state (manifest + GHCR package)'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }} \
            --raw > /tmp/manifest.json
          echo "Manifest size: $(wc -c < /tmp/manifest.json) bytes"
          OWNER=$(echo "${{ env.IMAGE }}" | cut -d/ -f1)
          PKG_PATH=$(echo "${{ env.IMAGE }}" | cut -d/ -f2-)
          export PKG_PATH
          ENCODED=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['PKG_PATH'], safe=''))")
          echo "Fetching GHCR package: /users/$OWNER/packages/container/$ENCODED"
          gh api "/users/$OWNER/packages/container/$ENCODED" > /tmp/ghcr.json
          echo "GHCR package file: $(wc -c < /tmp/ghcr.json) bytes"

      # ── 6a. PUSH CVE EVIDENCE ──────────────────────────────────────────
      - name: 'Step 6a — push CVE evidence to CrowsNest'
        id: push-cve
        uses: ./actions/push-cve-evidence
        with:
          api-url:      ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          token:        ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          app-id:       ${{ inputs.app-id || 'app-ACME' }}
          org-id:       '69e292d39fcbcce79bd877ad'
          image:        ${{ env.REGISTRY }}/${{ env.IMAGE }}
          image-digest: ${{ steps.build.outputs.digest }}
          trivy-file:   /tmp/trivy.json

      # ── 6b. PUSH SBOM EVIDENCE ─────────────────────────────────────────
      - name: 'Step 6b — push SBOM evidence to CrowsNest'
        id: push-sbom
        uses: ./actions/push-sbom-evidence
        with:
          api-url:      ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          token:        ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          app-id:       ${{ inputs.app-id || 'app-ACME' }}
          org-id:       '69e292d39fcbcce79bd877ad'
          image:        ${{ env.REGISTRY }}/${{ env.IMAGE }}
          image-digest: ${{ steps.build.outputs.digest }}
          sbom-file:    /tmp/sbom.json

      # ── 6c. PUSH STORAGE EVIDENCE ──────────────────────────────────────
      - name: 'Step 6c — push artifact-storage evidence to CrowsNest'
        id: push-storage
        uses: ./actions/push-storage-evidence
        with:
          api-url:           ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          token:             ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          app-id:            ${{ inputs.app-id || 'app-ACME' }}
          org-id:            '69e292d39fcbcce79bd877ad'
          image:             ${{ env.REGISTRY }}/${{ env.IMAGE }}
          image-digest:      ${{ steps.build.outputs.digest }}
          manifest-file:     /tmp/manifest.json
          ghcr-package-file: /tmp/ghcr.json
          registry:          ${{ env.REGISTRY }}

      - name: 'Push outputs'
        run: |
          echo "CVE     crowdata-id:     ${{ steps.push-cve.outputs.crowdata-id }}"
          echo "  Critical CVEs:         ${{ steps.push-cve.outputs.critical-count }}"
          echo "  High CVEs:             ${{ steps.push-cve.outputs.high-count }}"
          echo "SBOM    crowdata-id:     ${{ steps.push-sbom.outputs.crowdata-id }}"
          echo "  Format:                ${{ steps.push-sbom.outputs.sbom-format }}"
          echo "  Components:            ${{ steps.push-sbom.outputs.component-count }}"
          echo "Storage crowdata-id:     ${{ steps.push-storage.outputs.crowdata-id }}"
          echo "  Visibility:            ${{ steps.push-storage.outputs.visibility }}"
          echo "  Attestations attached: ${{ steps.push-storage.outputs.attestations-attached }}"

      # ── 7. THE GATE ────────────────────────────────────────────────────
      # continue-on-error so a no-go does NOT abort the job before Step 9 can
      # finalize the build record. Step 10 re-asserts the failure afterward.
      - name: 'Step 7 — CrowsNest release gate'
        id: gate
        uses: ./
        continue-on-error: true
        with:
          api-url:          ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          app-id:           ${{ inputs.app-id || 'app-ACME' }}
          pipeline-name:    ${{ inputs.pipeline-name || 'acme-build-evidence' }}
          token:            ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          console-base-url: ${{ vars.CROWSNEST_PUBLIC_CONSOLE_URL }}
          # Attach the gate result to the lifecycle run opened in Step 0 so it's
          # ONE record (started → gate decision → finalized), not a duplicate.
          run-id:           ${{ steps.cn-start.outputs.run-id }}

      # ── 8. DEPLOY (only on go/warn) ────────────────────────────────────
      - name: 'Step 8 — deploy to production'
        if: steps.gate.outputs.decision == 'go' || steps.gate.outputs.decision == 'warn'
        run: |
          echo "✓ Gate passed (${{ steps.gate.outputs.decision }})."
          echo "  Image:      ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
          echo "  Run record: ${{ steps.gate.outputs.run-url }}"
          echo ""
          echo "In a real workflow this step would run:"
          echo "    kubectl set image deployment/payments-api payments-api=${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"

      # ── 9. FINALIZE the build record — ALWAYS ──────────────────────────
      # job.status is success|failure|cancelled here; the action maps it to the
      # run's terminal lifecycle status. Guarantees a build that broke at
      # compile/test/scan still shows as failed in CrowsNest.
      - name: 'Step 9 — report build OUTCOME to CrowsNest'
        if: always()
        uses: ./actions/report-build-status
        with:
          api-url:       ${{ vars.CROWSNEST_PUBLIC_API_URL }}
          token:         ${{ secrets.CROWSNEST_PUBLIC_TOKEN }}
          app-id:        ${{ inputs.app-id || 'app-ACME' }}
          pipeline-name: ${{ inputs.pipeline-name || 'acme-build-evidence' }}
          mode:          finalize
          run-id:        ${{ steps.cn-start.outputs.run-id }}
          job-status:    ${{ job.status }}

      # ── 10. Re-assert a no-go so the GHA run reflects the block ─────────
      - name: 'Step 10 — fail the job if the gate blocked'
        if: always() && steps.gate.outputs.decision == 'no-go'
        run: |
          echo "::error::CrowsNest gate decision was NO-GO — failing the build."
          exit 1
