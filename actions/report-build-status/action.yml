name: 'CrowsNest — report build status'
description: >
  Records a build's lifecycle in CrowsNest. In start mode it opens a
  PipelineRun (status=started) and returns its runId. In finalize mode it
  closes that run with a terminal status derived from the job result, so a
  build that fails BEFORE reaching the gate still shows up in CrowsNest as a
  failed run instead of silence.
author: 'CrowsNest'

inputs:
  api-url:
    description: 'Base URL of the CrowsNest api-server'
    required: true
  token:
    description: 'Bearer JWT (user or client) for the target org'
    required: true
  app-id:
    description: 'CrowsNest application id (app-XXXX)'
    required: true
  pipeline-name:
    description: 'CrowsNest pipeline this build targets'
    required: true
  mode:
    description: 'start (open a run) or finalize (close it)'
    required: true
  run-id:
    description: 'Required in finalize mode: the runId returned by the start call'
    required: false
    default: ''
  job-status:
    description: 'finalize mode: the GitHub job status (success | failure | cancelled)'
    required: false
    default: ''
  message:
    description: 'finalize mode: optional human-readable note'
    required: false
    default: ''
  source:
    description: 'Origin tag stored on the run'
    required: false
    default: 'github-actions'
  org-id:
    description: 'CrowsNest orgId (required today due to api-server type-mismatch on missing orgId)'
    required: false
    default: ''
  timeout-seconds:
    description: 'HTTP timeout'
    required: false
    default: '30'

outputs:
  run-id:
    description: 'start mode: the created run id (pass this to finalize and the gate)'
    value: ${{ steps.report.outputs.run-id }}

runs:
  using: composite
  steps:
    - id: report
      shell: bash
      env:
        CN_API_URL: ${{ inputs.api-url }}
        CN_TOKEN: ${{ inputs.token }}
        CN_APP_ID: ${{ inputs.app-id }}
        CN_PIPE: ${{ inputs.pipeline-name }}
        CN_MODE: ${{ inputs.mode }}
        CN_RUN_ID: ${{ inputs.run-id }}
        CN_JOB: ${{ inputs.job-status }}
        CN_MESSAGE: ${{ inputs.message }}
        CN_SOURCE: ${{ inputs.source }}
        CN_ORG_ID: ${{ inputs.org-id }}
        CN_TIMEOUT: ${{ inputs.timeout-seconds }}
        GH_REPO: ${{ github.repository }}
        GH_SHA: ${{ github.sha }}
        GH_REF: ${{ github.ref_name }}
        GH_RUNID: ${{ github.run_id }}
        GH_ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail

        if [[ ! "$CN_APP_ID" =~ ^app-[A-Za-z0-9]{4}$ ]]; then
          echo "::error::app-id must be app-XXXX, got: $CN_APP_ID"; exit 1
        fi

        if [ "$CN_MODE" = "start" ]; then
          python3 -c 'import json,os; meta={"repository":os.environ.get("GH_REPO",""),"sha":os.environ.get("GH_SHA",""),"ref":os.environ.get("GH_REF",""),"runId":os.environ.get("GH_RUNID",""),"actor":os.environ.get("GH_ACTOR","")}; doc={"appId":os.environ["CN_APP_ID"],"pipelineName":os.environ["CN_PIPE"],"source":os.environ["CN_SOURCE"],"pipelineMeta":meta}; doc.update({"orgId":os.environ["CN_ORG_ID"]} if os.environ.get("CN_ORG_ID") else {}); open("/tmp/cn-start-body.json","w").write(json.dumps(doc))'
          HTTP=$(curl -sS -w "\n%{http_code}" -o /tmp/cn-start.json --max-time "$CN_TIMEOUT" \
            -X POST "$CN_API_URL/api/pipeline/runs/start" \
            -H "Authorization: Bearer $CN_TOKEN" -H "Content-Type: application/json" \
            --data-binary @/tmp/cn-start-body.json | tail -1)
          if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
            echo "::error::start failed (HTTP $HTTP)"; cat /tmp/cn-start.json; exit 1
          fi
          RID=$(python3 -c 'import json; print(json.load(open("/tmp/cn-start.json"))["runId"])')
          echo "run-id=$RID" >> "$GITHUB_OUTPUT"
          echo "::notice::CrowsNest build run started: $RID"
          printf '### CrowsNest — build started\n\n| Field | Value |\n|---|---|\n| Run id | `%s` |\n| App | `%s` |\n| Pipeline | `%s` |\n| Commit | `%s` |\n' "$RID" "$CN_APP_ID" "$CN_PIPE" "${GH_SHA:0:12}" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        if [ "$CN_MODE" = "finalize" ]; then
          if [ -z "$CN_RUN_ID" ]; then
            echo "::warning::finalize called with no run-id; nothing to finalize."
            exit 0
          fi
          case "$CN_JOB" in
            success)   ST="passed" ;;
            failure)   ST="failed" ;;
            cancelled) ST="cancelled" ;;
            *)         ST="errored" ;;
          esac
          MSG="${CN_MESSAGE:-job.status=$CN_JOB}"
          ST="$ST" MSG="$MSG" python3 -c 'import json,os; open("/tmp/cn-final-body.json","w").write(json.dumps({"status":os.environ["ST"],"message":os.environ["MSG"]}))'
          HTTP=$(curl -sS -w "\n%{http_code}" -o /tmp/cn-final.json --max-time "$CN_TIMEOUT" \
            -X POST "$CN_API_URL/api/pipeline/runs/$CN_RUN_ID/finalize" \
            -H "Authorization: Bearer $CN_TOKEN" -H "Content-Type: application/json" \
            --data-binary @/tmp/cn-final-body.json | tail -1)
          if [ "$HTTP" != "200" ]; then
            echo "::warning::finalize failed (HTTP $HTTP)"; cat /tmp/cn-final.json; exit 0
          fi
          echo "::notice::CrowsNest build run $CN_RUN_ID finalized: $ST"
          printf '### CrowsNest — build finalized: `%s`\n\n| Field | Value |\n|---|---|\n| Run id | `%s` |\n| Job status | `%s` |\n' "$ST" "$CN_RUN_ID" "$CN_JOB" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        echo "::error::mode must be start or finalize, got: $CN_MODE"
        exit 1
